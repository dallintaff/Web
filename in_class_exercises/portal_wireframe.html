<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework Portal Wireframe</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Megrim&family=Ubuntu:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#B8B8D1;
            font-family:'Ubuntu', sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:900px;
            background:white;
            border:2px solid #333;
        }

        /* ---------------- HEADER ---------------- */

        header{
            display:grid;
            grid-template-columns:150px 1fr;
            border-bottom:2px solid #333;
        }

        .logo-box{
            display:flex;
            justify-content:center;
            align-items:center;
            border-right:2px solid #333;
            padding:20px;
            min-height:180px;
        }

        .logo{
            width:90px;
            height:90px;
            border:2px solid #333;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Megrim', cursive;
            font-size:1.2rem;
        }

        .hero{
            display:flex;
            justify-content:flex-end;
            align-items:center;
            padding:30px;
            background:#f7f7f7;
        }

        .hero h1{
            font-family:'Megrim', cursive;
            font-size:2rem;
            text-align:right;
            color:#262535;
        }

        /* ---------------- NAVIGATION ---------------- */

        nav{
            border-bottom:2px solid #333;
            background:#D72638;
        }

        nav ul{
            display:flex;
            justify-content:center;
            list-style:none;
        }

        nav li{
            padding:18px 35px;
        }

        nav a{
            text-decoration:none;
            color:white;
            font-weight:500;
            transition:0.3s;
        }

        nav a:hover{
            color:#B8B8D1;
        }

        /* ---------------- GRID SECTION ---------------- */

        .grid-container{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:40px;
            padding:50px;
            justify-items:center;
            background:rgba(94, 177, 191, 0.7);
        }

        .card{
            width:180px;
            height:180px;
            border:2px solid #333;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:15px;
            font-size:1rem;
            color:#333;
        }

        /* ---------------- FOOTER ---------------- */

        footer{
            text-align:center;
            padding:20px;
            border-top:2px solid #333;
            background:#262535;
            color:white;
        }

    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>

            <div class="logo-box">
                <div class="logo">
                    Logo
                </div>
            </div>

            <div class="hero">
                <h1>Dallin Taff Web Homework Portal</h1>
            </div>

        </header>

        <!-- NAVIGATION -->
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Homework</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">About Me</a></li>
            </ul>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="grid-container">

            <div class="card">
                Font 1: Megrim<br><br>
                Font 2: Ubuntu Sans
            </div>

            <div class="card">
                Color 1: #B8B8D1<br><br>
                Color 2: #D72638<br><br>
                Color 3: #262535<br><br>
                Color 4: rgba(94,177,191,0.7)
            </div>

            <div class="card">
                Assignment
            </div>

            <div class="card">
                Assignment
            </div>

            <div class="card">
                Assignment
            </div>

            <div class="card">
                Assignment
            </div>

        </main>

        <!-- FOOTER -->
        <footer>
            © 2026 Dallin Taff
        </footer>

    </div>

</body>
</html>
