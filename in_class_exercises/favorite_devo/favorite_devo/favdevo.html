<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
          <table class="table">
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
            <tr>
              <td>Elder Robert C. Gay</td>
              <td>Be True to the voice of God</td>
              <td>BYUI I-Center</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>Elder B. Corey Cuvelier</td>
              <td>A Great Check</td>
              <td>BYUI I-Center</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>Kassandra M. Machley</td>
              <td>The Transforming Power of Jesus Christ</td>
              <td>BYUI I-Center</td>
              <td>2026</td>
            </tr>
          </table>

          <h2> Enter a New Devotional</h2>
          
          <form>
              <label for="Speaker">Speaker</label>
              <input id="Speaker" type="text">

            <label for="Title">Title</label>
            <input id="Title" type="text">

            <label for="Location">Location</label>
            <input id="Location" type="text">

            <label for="Year">Year</label>
            <input id="Year" type="text">

            <input type="submit">
          </form>

      </div>
    </main>
  </div>
</body>
</html>
