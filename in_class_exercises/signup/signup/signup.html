<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            background-color: white;
            border-radius: 30px;
            border: 7px solid navy;
            width: 400px;
            height: 600px;
            justify-self: center;
            margin-top: 25px;
        }

        #banner {
            background-image: url(images/jesus_feeds_5000.jpeg);
            background-size: cover;
            height: 200px;
            color: white;
            border-radius: 20px 20px 0 0;
            text-shadow: 3px 2px 1px rgba(0, 0, 0);
        }

        h1 {
            position: absolute;
            top: 160px;
            margin-left: 125px;
            }

        h2 {
            position: absolute;
            margin-left: 120px;
            top: 200px; 
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        #closeBtn {
            position: absolute;
            top: 70px;
            margin-left: 15px;
        }

        h3 {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        label {
            text-align: left;
            margin-left: 20px;
            margin-top: 20px;
        }

        input {
            margin-right: 20px;
            height: 15px;
            margin-top: auto;
        }

        section {
            grid-column: span 2;
            text-align: center;
            margin-top: 10px;
        }

        #gender {
            margin-top: auto;
        }

        #gender input {
            margin: 0;
        }

        #gender label {
            margin: 0;
        }

        section input, section label {
            margin: 0;
        }

        section button {
            margin-top: 10px;
        }

        #img {
            display: flex;
            height: 100px;
            justify-content: space-between;
            margin-top: 6px;
        }

        #old {
            border-radius: 0 0 0 20px;
        }

        #pearl {
            border-radius: 0 0 20px 0;
        }
    </style>



,
</head>

<body>
    <div id="formContainer">
        <div id="banner">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div id="gender">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label " for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>

        <div id="img">
            <img id="old" src="images/old_testament.webp" alt="old">
            <img src="images/new_testament.webp" alt="new">
            <img src="images/book_of_mormon.webp" alt="mormon">
            <img src="images/doctrine_and_covenants.webp" alt="dnc">
            <img id="pearl" src="images/pearl_of_great_price.webp" alt="pearl">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
